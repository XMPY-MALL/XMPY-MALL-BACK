spring:
  profiles:
    active: common # 현재 프로필 설정
    group: # 특정 프로필을 실행할때, 같이 실행되게끔 그룹 짓기
      common: secret # common이 실행되면. secret 프로필 설정

---

spring:
  config:
    activate:
      on-profile: common

  application:
    name: spring-boot-study
# xmpy-mall 서버 연결 완료

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.xmpy.demo.entity
# mapper 연결 완료